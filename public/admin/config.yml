backend:
  name: github
  repo: robavionix/website
  branch: main

# Personal-site scale: this uses the built-in "Sign In with Token" method
# (GitHub personal access token, pasted at login) rather than a full OAuth
# app + relay worker. See https://sveltiacms.app/en/docs/backends/github#access-token
# -- that method is what Sveltia's own docs recommend when you (or a small
# technical team) are the only editor.

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

i18n:
  structure: multiple_folders
  locales: [english, chinese]
  default_locale: english

collections:
  - name: blog
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: src/content/blog
    create: true
    i18n: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: title, widget: string, i18n: true }
      - {
          label: "Description",
          name: description,
          widget: text,
          required: false,
          i18n: true,
        }
      - { label: "Date", name: date, widget: datetime, required: false }
      - {
          label: "Cover Image",
          name: image,
          widget: image,
          required: false,
          i18n: duplicate,
        }
      - { label: "Draft", name: draft, widget: boolean, default: false }
      - {
          label: "Categories",
          name: categories,
          widget: list,
          required: false,
          i18n: true,
        }
      - {
          label: "Tags",
          name: tags,
          widget: list,
          required: false,
          i18n: true,
        }
      - { label: "Body", name: body, widget: markdown, i18n: true }

  - name: pages
    label: "Static Pages"
    label_singular: "Page"
    folder: src/content/pages
    create: false
    i18n: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: title, widget: string, i18n: true }
      - {
          label: "Meta Description",
          name: metaDescription,
          widget: text,
          required: false,
          i18n: true,
        }
      - { label: "Draft", name: draft, widget: boolean, default: false }
      - { label: "Body", name: body, widget: markdown, i18n: true }
